name: Build MangaLivre APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate debug keystore
        run: |
          keytool -genkeypair \
            -alias mihon \
            -keypass mihon123 \
            -keystore signingkey.jks \
            -storepass mihon123 \
            -dname "CN=Mihon, O=Mihon, C=BR" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650

      - name: Build MangaLivre
        env:
          ALIAS: mihon
          KEY_STORE_PASSWORD: mihon123
          KEY_PASSWORD: mihon123
        run: |
          chmod +x gradlew
          ./gradlew :src:pt:mangalivre:assembleRelease \
            --no-daemon \
            --stacktrace

      - name: Find APK
        run: find . -name "*.apk" | head -20

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: manga-livre-fix
          path: "**/*.apk"
          retention-days: 7